spring:
  datasource:
    url: ${NOTIFICATIONS_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/notifications_db}}
    username: ${NOTIFICATIONS_DB_USER:${DATABASE_USER:notifications_user}}
    password: ${NOTIFICATIONS_DB_PASSWORD:${DATABASE_PASSWORD:}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:${NOTIFICATIONS_SERVICE_PORT:8087}}

auth0:
  issuer-uri: ${AUTH0_ISSUER_URI}
  audience: ${AUTH0_AUDIENCE}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

brooks:
  web:
    origins: ${BROOKS_WEB_ORIGINS}

internal:
  service:
    keys: ${INTERNAL_SERVICE_KEYS:${INTERNAL_SERVICE_KEY:default-change-me}}
    allowed-names: ${INTERNAL_SERVICE_ALLOWED_NAMES:pins-service}
    key-map: ${INTERNAL_SERVICE_KEY_MAP:}

logging:
  level:
    root: INFO
    com.brooks.notifications: INFO
